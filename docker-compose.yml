services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: meetmate_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend-api

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: meetmate_backend_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://meetmate:meetmate@postgres:5432/meetmate
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
      - SMTP_HOST=${SMTP_HOST_DOCKER:-mailhog}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    container_name: meetmate_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://meetmate:meetmate@postgres:5432/meetmate
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
      - SMTP_HOST=${SMTP_HOST_DOCKER:-mailhog}
      # OLLAMA_HOST diset ke host.docker.internal karena Ollama di-run secara native di host agar dapat akses GPU
      - OLLAMA_HOST=http://host.docker.internal:11434
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
    depends_on:
      backend-api:
        condition: service_started
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:16
    container_name: meetmate_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: meetmate
      POSTGRES_PASSWORD: meetmate
      POSTGRES_DB: meetmate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetmate"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: meetmate_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: meetmate_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: meetmate_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP port (backend kirim email ke sini)
      - "8025:8025"   # Web UI (buka di browser buat lihat email)

  adminer:
    image: adminer
    container_name: meetmate_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data: